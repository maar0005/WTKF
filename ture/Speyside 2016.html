<script id="tur-raw" type="text/plain">
Foreningens første store pilgrimsrejse til Skotland. Ti WTKF-medlemmer tog afsted fra København den 28. september 2016 — og kom hjem fire dage senere med lys i øjnene og whisky i blodet.

## Program

• 28. sep: Afgang KBH kl. 22:00 → Edinburgh kl. 22:50.
• 29. sep: Kørsel til Speyside (ca. 200 km) med stop undervejs. Ankomst og indkvartering ved Craigellachie.
• 29–01. okt: Destilleribesøg i Speyside-regionen. Klapning af det første WTKF-fad.
• 01. okt: Kørsel sydpå, overnatning Edinburgh.
• 02. okt: Hjemrejse KBH kl. 16:10.

---

## Speyside — whiskyens hjemegn

Speyside er den region i verden med flest whisky-destillerier koncentreret på et lille område. Floden Spey løber gennem dalen og har i generationer givet det bløde vand der præger regionens whisky: frugtig, blomstret, elegant.

Vi besøgte fem destillerier i løbet af tre dage — hvert med sin helt egen personlighed og sin helt egne tilgang til håndværket.

## Craigellachie — det første fad

Højdepunktet på turen var klapningen af foreningens allerførste fad hos Craigellachie destilleri. Med traditionelle worm tub-kondensatorer og et udtalt svovlagtigt præg er Craigellachie ikke whisky for alle — men foreningen valgte den med åbne øjne.

Tønden blev klappet med begge hænder af hvert eneste fremmødte medlem. En tradition var født.

## Glenfarclas

Glenfarclas er familieejet — sjette generation Grant-familien driver stadig destilleriet. De er kendte for tung sherry-modning og aldrig at have solgt til et multinationale selskab. Besøget her var uformelt og personligt på en måde de store destillerier sjældent kan matche.

Vi fik en smagning af The Family Casks — udtryk fra enkeltfade med op til 50 års lagring. Det var en oplevelse der satte standarden for hvad et godt fad kan opnå med tid.

## Hjemturen

Rejsen hjem fra Edinburgh gik stille og roligt. Bagagen var tung af flasker og noter. På flyet hjem diskuterede vi allerede hvornår vi skulle tilbage — og hvad det næste fad skulle blive.
</script>

<script>
document.title = TUR_TITEL + " – WTKF";
const page = document.getElementById("page-content");
const hero = document.createElement("div"); hero.className = "hero";
hero.innerHTML = `<div class="hero-bg" style="background-image:url('${TUR_BILLEDE}')"></div><div class="hero-overlay"></div><div class="hero-year-deco">${TUR_AAR}</div><div class="hero-content"><div class="hero-eyebrow">Tønde Klappe Tur · ${TUR_AAR}</div><h1 class="hero-title">${TUR_TITEL}</h1><div class="hero-dest">${TUR_DESTINATION}</div></div>`;
page.appendChild(hero);
const meta = document.createElement("div"); meta.className = "meta-strip";
[{label:"Destination",value:TUR_DESTINATION},{label:"Tidspunkt",value:TUR_DATO},{label:"År",value:TUR_AAR},{label:"Deltagere",value:TUR_DELTAGERS+" medlemmer"}]
  .filter(m => m.value && !m.value.startsWith("0"))
  .forEach(({label,value}) => { meta.innerHTML += `<div class="meta-item"><span class="meta-label">${label}</span><span class="meta-value">${value}</span></div>`; });
page.appendChild(meta);
const art = document.createElement("article"); art.innerHTML = `<div class="content" id="tur-content"></div>`; page.appendChild(art);
const raw = document.getElementById("tur-raw").textContent.trim();
const el = document.getElementById("tur-content"); let list = null;
raw.split(/\n/).forEach(line => {
  const s = line.trim();
  if (s.startsWith("## ")) { if(list){el.appendChild(list);list=null;} const h=document.createElement("h2");h.textContent=s.slice(3);el.appendChild(h); }
  else if (s === "---") { if(list){el.appendChild(list);list=null;} el.appendChild(document.createElement("hr")); }
  else if (s.startsWith("• ") || s.startsWith("- ")) { if(!list){list=document.createElement("ul");} const li=document.createElement("li");li.textContent=s.slice(2);list.appendChild(li); }
  else if (s === "") { if(list){el.appendChild(list);list=null;} }
  else { if(list){el.appendChild(list);list=null;} const p=document.createElement("p");p.textContent=s;el.appendChild(p); }
});
if(list) el.appendChild(list);
</script>
