<script>
  // Sæt titler fra konfiguration
  document.title = REFERAT_TITEL + " – WTKF";
  document.getElementById("page-titel").textContent = REFERAT_TITEL;
  document.getElementById("page-dato").textContent = REFERAT_DATO;
  document.getElementById("bc-titel").textContent = REFERAT_TITEL;

  // Parse og render tekst
  const raw = document.getElementById("referat-raw").textContent;
  const lines = raw.split(/\r?\n/);
  const output = document.getElementById("referat-output");

  let olActive = false;
  let ulActive = false;
  let currentOl = null;
  let currentUl = null;

  function closeLists() {
    if (olActive) { olActive = false; currentOl = null; }
    if (ulActive) { ulActive = false; currentUl = null; }
  }

  lines.forEach(line => {
    const trimmed = line.trim();

    // Skip first/last empty lines at edge of template
    if (!trimmed && !output.children.length) return;

    // Divider
    if (/^---+$/.test(trimmed)) {
      closeLists();
      const hr = document.createElement("hr");
      output.appendChild(hr);
      return;
    }

    // Numbered list item: starts with digit(s) followed by ". "
    if (/^\d+\.\s/.test(trimmed)) {
      if (ulActive) { ulActive = false; currentUl = null; }
      if (!olActive) {
        olActive = true;
        currentOl = document.createElement("ol");
        output.appendChild(currentOl);
      }
      const li = document.createElement("li");
      li.textContent = trimmed.replace(/^\d+\.\s*/, "");
      currentOl.appendChild(li);
      return;
    }

    // Bullet list item: starts with • or -
    if (/^[•\-]\s/.test(trimmed)) {
      if (olActive) { olActive = false; currentOl = null; }
      if (!ulActive) {
        ulActive = true;
        currentUl = document.createElement("ul");
        output.appendChild(currentUl);
      }
      const li = document.createElement("li");
      li.textContent = trimmed.replace(/^[•\-]\s*/, "");
      currentUl.appendChild(li);
      return;
    }

    // Sub-heading: "Ad N." or ALL CAPS short line
    if (/^Ad\s+\d+/i.test(trimmed) || (/^[A-ZÆØÅ\s]{4,40}$/.test(trimmed) && trimmed.length < 60 && trimmed.length > 3)) {
      closeLists();
      const h3 = document.createElement("h3");
      h3.textContent = trimmed;
      output.appendChild(h3);
      return;
    }

    // Empty line = paragraph break
    if (!trimmed) {
      closeLists();
      return;
    }

    // Normal paragraph text
    closeLists();
    // Try to append to last <p> if it's not huge yet, else new paragraph
    const last = output.lastElementChild;
    if (last && last.tagName === "P" && last.textContent.length < 400) {
      last.textContent += " " + trimmed;
    } else {
      const p = document.createElement("p");
      p.textContent = trimmed;
      output.appendChild(p);
    }
  });
</script>
