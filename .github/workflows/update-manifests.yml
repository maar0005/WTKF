name: Opdater manifests

on:
  push:
    branches: [main]
    paths:
      - "nyheder/**.html"
      - "ture/**.html"
  workflow_dispatch:

jobs:
  build-manifests:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Byg manifests fra HTML-filer
        run: python3 .github/scripts/build_manifests.py

      - name: Commit opdaterede manifests
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add nyheder/manifest.json ture/manifest.json
          git diff --cached --quiet || git commit -m "auto: opdater manifests [skip ci]"
          git push
