name: Deploy til Simply

on:
  push:
    branches: [main]
  workflow_dispatch:

# Undgå at to deploys kører oven i hinanden (fx push + manifest-commit)
concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Tjek interne links
        run: python3 .github/scripts/check_links.py

      - name: Byg manifests, sitemap og RSS-feed
        run: python3 .github/scripts/build_manifests.py

      - name: Commit genererede filer
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add nyheder/manifest.json ture/manifest.json sitemap.xml nyheder/feed.xml
          if git diff --cached --quiet; then
            echo "Ingen ændringer i genererede filer"
          else
            git commit -m "auto: opdater manifests, sitemap og feed [skip ci]"
            git push
          fi

      - name: Deploy via FTPS
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.SIMPLY_HOST }}
          username: ${{ secrets.SIMPLY_USER }}
          password: ${{ secrets.SIMPLY_PASSWORD }}
          server-dir: ${{ secrets.SIMPLY_PATH }}
          protocol: ftps
          exclude: |
            **/.git*
            **/.git*/**
            **/.github/**
            **/node_modules/**
            **/data/snapshots/**
            AGENT_PLAN.md
            README.md

      - name: Smoke test
        env:
          SMOKE_URL: ${{ secrets.SMOKE_TEST_URL }}
        run: |
          for i in 1 2 3 4 5; do
            sleep 15
            STATUS=$(curl -o /dev/null -s -w "%{http_code}" -A "Mozilla/5.0" "$SMOKE_URL")
            if [[ "$STATUS" =~ ^(200|301|302)$ ]]; then
              echo "$SMOKE_URL svarer 200 OK"
              exit 0
            fi
            echo "Forsøg $i: $SMOKE_URL returnerede HTTP $STATUS"
          done
          echo "::error::$SMOKE_URL returnerede HTTP $STATUS efter 5 forsøg"
          exit 1
