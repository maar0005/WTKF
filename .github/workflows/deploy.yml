name: Deploy til Simply

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via FTPS
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.SIMPLY_HOST }}
          username: ${{ secrets.SIMPLY_USER }}
          password: ${{ secrets.SIMPLY_PASSWORD }}
          server-dir: ${{ secrets.SIMPLY_PATH }}
          protocol: ftps
          exclude: |
            **/.git*
            **/.git*/**
            **/.github/**
            **/node_modules/**
            **/data/snapshots/**
            AGENT_PLAN.md
            README.md

      - name: Smoke test
        env:
          SMOKE_URL: ${{ secrets.SMOKE_TEST_URL }}
        run: |
          for i in 1 2 3 4 5; do
            sleep 15
            STATUS=$(curl -o /dev/null -s -w "%{http_code}" -A "Mozilla/5.0" "$SMOKE_URL")
            if [[ "$STATUS" =~ ^(200|301|302)$ ]]; then
              echo "$SMOKE_URL svarer 200 OK"
              exit 0
            fi
            echo "Forsøg $i: $SMOKE_URL returnerede HTTP $STATUS"
          done
          echo "::error::$SMOKE_URL returnerede HTTP $STATUS efter 5 forsøg"
          exit 1

  update-manifests:
    needs: deploy
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Byg manifests fra HTML-filer
        run: python3 .github/scripts/build_manifests.py

      - name: Commit og upload opdaterede manifests
        env:
          FTP_HOST: ${{ secrets.SIMPLY_HOST }}
          FTP_USER: ${{ secrets.SIMPLY_USER }}
          FTP_PASS: ${{ secrets.SIMPLY_PASSWORD }}
          FTP_PATH: ${{ secrets.SIMPLY_PATH }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add nyheder/manifest.json ture/manifest.json
          if git diff --cached --quiet; then
            echo "Ingen manifest-ændringer"
          else
            git commit -m "auto: opdater manifests [skip ci]"
            git push
            sudo apt-get install -y lftp
            lftp -c "
              set net:prefer-family IPv4
              set ftp:ssl-force true
              set ssl:verify-certificate false
              open -u $FTP_USER,$FTP_PASS ftp://$FTP_HOST
              put -O ${FTP_PATH}nyheder nyheder/manifest.json
              put -O ${FTP_PATH}ture ture/manifest.json
              quit
            "
          fi
