name: Daglig Sheets backup

on:
  schedule:
    # Hver dag kl 03:00 UTC = 04:00/05:00 dansk tid
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Hent CSV fra Sheets
        run: |
          mkdir -p data/snapshots
          DATE=$(date +%Y-%m-%d)

          # Samme base-URL, forskellig GID per fane (spejler wtkf-data.js)
          BASE="${{ secrets.SHEETS_CSV_URL }}"
          curl -fL "${BASE}?gid=367938426&single=true&output=csv" -o "data/fade.csv"
          curl -fL "${BASE}?gid=0&single=true&output=csv"         -o "data/andele.csv"

          cp "data/fade.csv"   "data/snapshots/fade-${DATE}.csv"
          cp "data/andele.csv" "data/snapshots/andele-${DATE}.csv"

      - name: Verificér at filerne ikke er tomme
        run: |
          for f in data/fade.csv data/andele.csv; do
            if [ ! -s "$f" ]; then
              echo "::error::$f er tom — Sheets-URL forkert?"
              exit 1
            fi
            LINES=$(wc -l < "$f")
            echo "$f: $LINES linjer"
          done

      - name: Commit til GitHub
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --staged --quiet; then
            echo "Ingen ændringer i data"
          else
            git commit -m "Sheets backup $(date +%Y-%m-%d)"
            git push
          fi

      - name: Upload CSV-filer til Simply
        env:
          FTP_HOST: ${{ secrets.SIMPLY_HOST }}
          FTP_USER: ${{ secrets.SIMPLY_USER }}
          FTP_PASS: ${{ secrets.SIMPLY_PASSWORD }}
          FTP_PATH: ${{ secrets.SIMPLY_PATH }}
        run: |
          sudo apt-get install -y lftp
          lftp -c "
            set net:prefer-family IPv4
            set ftp:ssl-force true
            set ssl:verify-certificate false
            open -u $FTP_USER,$FTP_PASS ftp://$FTP_HOST
            put -O ${FTP_PATH}data data/fade.csv
            put -O ${FTP_PATH}data data/andele.csv
            quit
          "
